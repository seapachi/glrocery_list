<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

const DEFAULT_SCHEMA_VERSION = 1;
const EXPORT_SCHEMA_VERSION = 1;

const SK_KEYWORDS   = "grocery-custom-keywords";
const SK_CATEGORIES = "grocery-custom-categories";
const SK_ORDER      = "grocery-category-order";

const ls = {
  get(key)      { try { return localStorage.getItem(key); } catch { return null; } },
  set(key, val) { try { localStorage.setItem(key, val); } catch {} },
};

function isPlainObject(value) {
  return !!value && typeof value === "object" && !Array.isArray(value);
}

function uniqueNonEmptyStrings(values) {
  if (!Array.isArray(values)) return [];
  const seen = new Set();
  const next = [];
  for (const value of values) {
    if (typeof value !== "string") continue;
    const trimmed = value.trim();
    if (!trimmed || seen.has(trimmed)) continue;
    seen.add(trimmed);
    next.push(trimmed);
  }
  return next;
}

function sanitizeKeywordMap(raw) {
  if (!isPlainObject(raw)) return {};
  const out = {};
  for (const [key, value] of Object.entries(raw)) {
    if (typeof key !== "string" || typeof value !== "string") continue;
    const kw = key.trim();
    const cat = value.trim();
    if (!kw || !cat) continue;
    out[kw] = cat;
  }
  return out;
}

function sanitizeCustomCategories(raw, otherCategoryName) {
  if (!Array.isArray(raw)) return [];
  const seen = new Set();
  const out = [];
  for (const entry of raw) {
    if (!isPlainObject(entry)) continue;
    const name = typeof entry.name === "string" ? entry.name.trim() : "";
    if (!name || name === otherCategoryName || seen.has(name)) continue;
    seen.add(name);
    out.push({ name, keywords: uniqueNonEmptyStrings(entry.keywords) });
  }
  return out;
}

function categoriesToMap(categories) {
  const map = {};
  for (const category of categories) {
    map[category.name] = [...category.keywords];
  }
  return map;
}

function sanitizeCategoryOrder(rawOrder, defaultCategoryKeys, customCategories, otherCategoryName) {
  const customNames = customCategories.map((c) => c.name);
  const allowedOrder = [...defaultCategoryKeys, ...customNames, otherCategoryName];
  const allowedSet = new Set(allowedOrder);

  const next = [];
  if (Array.isArray(rawOrder)) {
    for (const entry of rawOrder) {
      if (typeof entry !== "string") continue;
      const cat = entry.trim();
      if (!cat || !allowedSet.has(cat) || next.includes(cat)) continue;
      next.push(cat);
    }
  }

  for (const cat of defaultCategoryKeys) {
    if (!next.includes(cat)) next.push(cat);
  }
  for (const cat of customNames) {
    if (!next.includes(cat)) next.push(cat);
  }
  if (!next.includes(otherCategoryName)) next.push(otherCategoryName);

  return next;
}

function filterKeywordTargets(keywordMap, allowedCategoryNames) {
  const allowedSet = new Set(allowedCategoryNames);
  return Object.fromEntries(Object.entries(keywordMap).filter(([, cat]) => allowedSet.has(cat)));
}

function areStringArraysEqual(a, b) {
  if (!Array.isArray(a) || !Array.isArray(b)) return false;
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i += 1) {
    if (a[i] !== b[i]) return false;
  }
  return true;
}

function categoryFingerprint(category) {
  return JSON.stringify({
    name: category.name,
    keywords: [...category.keywords].sort(),
  });
}

function areCategoryDefinitionsEqual(a, b) {
  return categoryFingerprint(a) === categoryFingerprint(b);
}

function buildCategoryMap(defaultCategoryMap, customKeywords, customCategories) {
  const map = {};
  for (const [cat, kws] of Object.entries(defaultCategoryMap)) map[cat] = [...kws];
  for (const cc of customCategories) map[cc.name] = [...(cc.keywords || [])];
  for (const [kw, cat] of Object.entries(customKeywords)) {
    if (map[cat] && !map[cat].includes(kw)) map[cat].push(kw);
  }
  return map;
}

function categorize(name, map, otherCategoryName) {
  for (const [cat, kws] of Object.entries(map)) {
    if (kws.some((k) => name.includes(k))) return cat;
  }
  return otherCategoryName;
}

function parseList(text, map, otherCategoryName) {
  return text.split(/[、,，\n]+/).map((s) => s.trim()).filter(Boolean)
    .map((name, i) => ({ id: i, name, done: false, category: categorize(name, map, otherCategoryName) }));
}

function sortedGroups(groups, order) {
  return order.filter((c) => groups[c])
    .concat(Object.keys(groups).filter((c) => !order.includes(c)));
}

function validateDefaultConfig(raw) {
  if (!isPlainObject(raw)) {
    throw new Error("default-categories.json はオブジェクト形式で指定してください。");
  }
  if (raw.version !== DEFAULT_SCHEMA_VERSION) {
    throw new Error(`default-categories.json の version は ${DEFAULT_SCHEMA_VERSION} を指定してください。`);
  }

  const otherCategoryName = typeof raw.otherCategoryName === "string" ? raw.otherCategoryName.trim() : "";
  if (!otherCategoryName) {
    throw new Error("default-categories.json の otherCategoryName は必須です。");
  }

  if (!Array.isArray(raw.categories) || raw.categories.length === 0) {
    throw new Error("default-categories.json の categories は1件以上必要です。");
  }

  const seenNames = new Set();
  const categories = raw.categories.map((entry, idx) => {
    if (!isPlainObject(entry)) {
      throw new Error(`categories[${idx}] の形式が不正です。`);
    }

    const name = typeof entry.name === "string" ? entry.name.trim() : "";
    if (!name) {
      throw new Error(`categories[${idx}] の name は必須です。`);
    }
    if (name === otherCategoryName) {
      throw new Error(`categories[${idx}] の name は otherCategoryName と重複できません。`);
    }
    if (seenNames.has(name)) {
      throw new Error(`categories の name が重複しています: ${name}`);
    }
    seenNames.add(name);

    if (!Array.isArray(entry.keywords)) {
      throw new Error(`categories[${idx}] の keywords は配列で指定してください。`);
    }

    const seenKeywords = new Set();
    const keywords = [];
    entry.keywords.forEach((kw, kwIdx) => {
      if (typeof kw !== "string") {
        throw new Error(`categories[${idx}].keywords[${kwIdx}] は文字列で指定してください。`);
      }
      const trimmed = kw.trim();
      if (!trimmed) {
        throw new Error(`categories[${idx}].keywords[${kwIdx}] は空文字を許可しません。`);
      }
      if (!seenKeywords.has(trimmed)) {
        seenKeywords.add(trimmed);
        keywords.push(trimmed);
      }
    });

    return { name, keywords };
  });

  const defaultCategoryKeys = categories.map((c) => c.name);
  const defaultCategoryMap = categoriesToMap(categories);
  const defaultOrder = [...defaultCategoryKeys, otherCategoryName];

  return {
    version: raw.version,
    otherCategoryName,
    categories,
    defaultCategoryKeys,
    defaultCategoryMap,
    defaultOrder,
  };
}

async function loadDefaultConfig() {
  const response = await fetch("./default-categories.json", { cache: "no-store" });
  if (!response.ok) {
    throw new Error(`default-categories.json の読み込みに失敗しました (HTTP ${response.status})。`);
  }
  const raw = await response.json();
  return validateDefaultConfig(raw);
}

function validateImportPayload(raw, defaultCategoryKeys, otherCategoryName) {
  if (!isPlainObject(raw)) {
    throw new Error("インポートファイルの形式が不正です。JSONオブジェクトを指定してください。");
  }
  if (raw.version !== EXPORT_SCHEMA_VERSION) {
    throw new Error(`インポートファイルの version は ${EXPORT_SCHEMA_VERSION} が必要です。`);
  }
  if (!isPlainObject(raw.data)) {
    throw new Error("インポートファイルの data が不正です。");
  }
  if (!isPlainObject(raw.data.customKeywords)) {
    throw new Error("data.customKeywords はオブジェクトで指定してください。");
  }
  if (!Array.isArray(raw.data.customCategories)) {
    throw new Error("data.customCategories は配列で指定してください。");
  }
  if (!Array.isArray(raw.data.categoryOrder)) {
    throw new Error("data.categoryOrder は配列で指定してください。");
  }

  const customKeywords = {};
  Object.entries(raw.data.customKeywords).forEach(([rawKeyword, rawCategory]) => {
    if (typeof rawKeyword !== "string") {
      throw new Error("data.customKeywords のキーは文字列で指定してください。");
    }
    if (typeof rawCategory !== "string") {
      throw new Error(`キーワード「${rawKeyword}」のカテゴリは文字列で指定してください。`);
    }
    const keyword = rawKeyword.trim();
    const category = rawCategory.trim();
    if (!keyword) {
      throw new Error("data.customKeywords に空のキーワードは指定できません。");
    }
    if (!category) {
      throw new Error(`キーワード「${keyword}」のカテゴリが空です。`);
    }
    customKeywords[keyword] = category;
  });

  const customCategories = [];
  const seenCustomCategoryNames = new Set();
  raw.data.customCategories.forEach((entry, idx) => {
    if (!isPlainObject(entry)) {
      throw new Error(`data.customCategories[${idx}] の形式が不正です。`);
    }
    const name = typeof entry.name === "string" ? entry.name.trim() : "";
    if (!name) {
      throw new Error(`data.customCategories[${idx}].name は必須です。`);
    }
    if (name === otherCategoryName) {
      throw new Error(`data.customCategories[${idx}].name は otherCategoryName と重複できません。`);
    }
    if (seenCustomCategoryNames.has(name)) {
      throw new Error(`data.customCategories の name が重複しています: ${name}`);
    }
    if (!Array.isArray(entry.keywords)) {
      throw new Error(`data.customCategories[${idx}].keywords は配列で指定してください。`);
    }

    const seenKeywords = new Set();
    const keywords = [];
    entry.keywords.forEach((kw, kwIdx) => {
      if (typeof kw !== "string") {
        throw new Error(`data.customCategories[${idx}].keywords[${kwIdx}] は文字列で指定してください。`);
      }
      const trimmed = kw.trim();
      if (!trimmed) {
        throw new Error(`data.customCategories[${idx}].keywords[${kwIdx}] は空文字を許可しません。`);
      }
      if (!seenKeywords.has(trimmed)) {
        seenKeywords.add(trimmed);
        keywords.push(trimmed);
      }
    });

    seenCustomCategoryNames.add(name);
    customCategories.push({ name, keywords });
  });

  const order = [];
  const seenOrder = new Set();
  raw.data.categoryOrder.forEach((entry, idx) => {
    if (typeof entry !== "string") {
      throw new Error(`data.categoryOrder[${idx}] は文字列で指定してください。`);
    }
    const trimmed = entry.trim();
    if (!trimmed) {
      throw new Error(`data.categoryOrder[${idx}] に空文字は指定できません。`);
    }
    if (seenOrder.has(trimmed)) {
      throw new Error(`data.categoryOrder に重複があります: ${trimmed}`);
    }
    seenOrder.add(trimmed);
    order.push(trimmed);
  });

  if (!order.length) {
    throw new Error("data.categoryOrder は1件以上必要です。");
  }

  const allowedCategories = new Set([
    ...defaultCategoryKeys,
    ...customCategories.map((c) => c.name),
    otherCategoryName,
  ]);

  for (const [keyword, cat] of Object.entries(customKeywords)) {
    if (!allowedCategories.has(cat)) {
      throw new Error(`キーワード「${keyword}」のカテゴリ「${cat}」が不正です。`);
    }
  }

  order.forEach((cat) => {
    if (!allowedCategories.has(cat)) {
      throw new Error(`data.categoryOrder に未知のカテゴリがあります: ${cat}`);
    }
  });

  return {
    customKeywords,
    customCategories,
    categoryOrder: order,
  };
}

function detectImportConflicts(currentData, incomingData) {
  const conflicts = [];

  for (const [keyword, incomingCategory] of Object.entries(incomingData.customKeywords)) {
    if (keyword in currentData.customKeywords && currentData.customKeywords[keyword] !== incomingCategory) {
      conflicts.push({
        id: `kw:${keyword}`,
        label: `キーワード: ${keyword}`,
        currentText: currentData.customKeywords[keyword],
        importedText: incomingCategory,
      });
    }
  }

  const currentCategoryByName = new Map(currentData.customCategories.map((cat) => [cat.name, cat]));
  incomingData.customCategories.forEach((incomingCategory) => {
    const currentCategory = currentCategoryByName.get(incomingCategory.name);
    if (!currentCategory) return;
    if (areCategoryDefinitionsEqual(currentCategory, incomingCategory)) return;
    conflicts.push({
      id: `cat:${incomingCategory.name}`,
      label: `カスタムカテゴリ: ${incomingCategory.name}`,
      currentText: currentCategory.keywords.length
        ? `現在: ${currentCategory.keywords.join("、")}`
        : "現在: （キーワードなし）",
      importedText: incomingCategory.keywords.length
        ? `取込: ${incomingCategory.keywords.join("、")}`
        : "取込: （キーワードなし）",
    });
  });

  if (!areStringArraysEqual(currentData.categoryOrder, incomingData.categoryOrder)) {
    conflicts.push({
      id: "order",
      label: "カテゴリ表示順",
      currentText: `現在: ${currentData.categoryOrder.join(" → ")}`,
      importedText: `取込: ${incomingData.categoryOrder.join(" → ")}`,
    });
  }

  return conflicts;
}

function mergeImportData(currentData, incomingData, choices, defaultCategoryKeys, otherCategoryName) {
  const mergedKeywords = { ...currentData.customKeywords };

  for (const [keyword, incomingCategory] of Object.entries(incomingData.customKeywords)) {
    if (!(keyword in mergedKeywords)) {
      mergedKeywords[keyword] = incomingCategory;
      continue;
    }
    const currentCategory = mergedKeywords[keyword];
    if (currentCategory === incomingCategory) continue;
    const choice = choices[`kw:${keyword}`] || "current";
    mergedKeywords[keyword] = choice === "imported" ? incomingCategory : currentCategory;
  }

  const currentCategoryByName = new Map(currentData.customCategories.map((cat) => [cat.name, cat]));
  incomingData.customCategories.forEach((incomingCategory) => {
    const currentCategory = currentCategoryByName.get(incomingCategory.name);
    if (!currentCategory) {
      currentCategoryByName.set(incomingCategory.name, incomingCategory);
      return;
    }
    if (areCategoryDefinitionsEqual(currentCategory, incomingCategory)) return;
    const choice = choices[`cat:${incomingCategory.name}`] || "current";
    currentCategoryByName.set(incomingCategory.name, choice === "imported" ? incomingCategory : currentCategory);
  });

  const mergedCategories = [];
  const seenCategoryNames = new Set();
  currentData.customCategories.forEach((cat) => {
    const chosen = currentCategoryByName.get(cat.name) || cat;
    if (seenCategoryNames.has(chosen.name)) return;
    seenCategoryNames.add(chosen.name);
    mergedCategories.push(chosen);
  });
  incomingData.customCategories.forEach((cat) => {
    if (seenCategoryNames.has(cat.name)) return;
    seenCategoryNames.add(cat.name);
    mergedCategories.push(currentCategoryByName.get(cat.name) || cat);
  });

  const orderConflict = !areStringArraysEqual(currentData.categoryOrder, incomingData.categoryOrder);
  const chosenOrder = orderConflict
    ? (choices.order === "imported" ? incomingData.categoryOrder : currentData.categoryOrder)
    : currentData.categoryOrder;

  const mergedOrder = sanitizeCategoryOrder(chosenOrder, defaultCategoryKeys, mergedCategories, otherCategoryName);

  const allowedCategoryNames = [
    ...defaultCategoryKeys,
    ...mergedCategories.map((c) => c.name),
    otherCategoryName,
  ];
  const finalKeywords = filterKeywordTargets(mergedKeywords, allowedCategoryNames);

  return {
    customKeywords: finalKeywords,
    customCategories: mergedCategories,
    categoryOrder: mergedOrder,
  };
}

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      resolve(typeof reader.result === "string" ? reader.result : "");
    };
    reader.onerror = () => reject(new Error("ファイルを読み込めませんでした。"));
    reader.readAsText(file, "UTF-8");
  });
}

const card       = { background: "#1a1f2e", borderRadius: 12, border: "1px solid #2a2f3e" };
const lbl        = { fontSize: 11, color: "#6c8ebf", fontWeight: 700, letterSpacing: 2 };
const inputSt    = { width: "100%", background: "#0f1117", border: "1px solid #3a4050", borderRadius: 8, color: "#e0e0e0", fontSize: 15, padding: "10px 12px", outline: "none", boxSizing: "border-box", fontFamily: "inherit" };
const btnPrimary = { background: "linear-gradient(135deg,#3b82f6,#1d4ed8)", border: "none", borderRadius: 10, color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", padding: "13px" };
const btnGhost   = { background: "transparent", border: "1px solid #2a2f3e", borderRadius: 10, color: "#555", fontSize: 14, cursor: "pointer", padding: "13px" };

function RegisterModal({ item, allCategoryKeys, onSave, onClose }) {
  const [selectedCat, setSelectedCat] = useState(allCategoryKeys[0] || "");
  const [keyword, setKeyword]         = useState(item.name);
  const [creating, setCreating]       = useState(false);
  const [newEmoji, setNewEmoji]       = useState("🗂️");
  const [newLabel, setNewLabel]       = useState("");

  const doSave = () => {
    if (!keyword.trim()) return;
    if (creating) {
      if (!newLabel.trim()) return;
      const name = `${newEmoji} ${newLabel.trim()}`;
      onSave(keyword.trim(), name, { name, keywords: [] });
    } else {
      onSave(keyword.trim(), selectedCat, null);
    }
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 100 }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: "#1a1f2e", borderRadius: "18px 18px 0 0", width: "100%", maxWidth: 480, margin: "0 auto", padding: "20px 20px 44px", border: "1px solid #2a2f3e", borderBottom: "none", maxHeight: "85vh", overflowY: "auto" }}>
        <div style={lbl}>CATEGORY REGISTER</div>
        <div style={{ fontSize: 17, fontWeight: 800, color: "#e8eaf0", margin: "4px 0 16px" }}>「{item.name}」を分類する</div>

        <div style={{ marginBottom: 14 }}>
          <div style={{ ...lbl, marginBottom: 6 }}>登録キーワード</div>
          <input value={keyword} onChange={(e) => setKeyword(e.target.value)} style={inputSt} />
          <div style={{ fontSize: 11, color: "#444", marginTop: 5, lineHeight: 1.5 }}>
            この文字列を「含む」アイテムが自動分類されます。
          </div>
        </div>

        {!creating && (
          <div style={{ marginBottom: 14 }}>
            <div style={{ ...lbl, marginBottom: 8 }}>カテゴリを選択</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {allCategoryKeys.map((cat) => (
                <button key={cat} onClick={() => setSelectedCat(cat)} style={{ padding: "7px 11px", borderRadius: 20, fontSize: 12, cursor: "pointer", border: `1px solid ${selectedCat === cat ? "#3b82f6" : "#2a2f3e"}`, background: selectedCat === cat ? "#1e3a6e" : "#0f1117", color: selectedCat === cat ? "#93c5fd" : "#666" }}>
                  {cat}
                </button>
              ))}
              <button onClick={() => setCreating(true)} style={{ padding: "7px 11px", borderRadius: 20, fontSize: 12, cursor: "pointer", border: "1px dashed #3b82f6", background: "#0a1628", color: "#3b82f6" }}>
                ＋ 新しいカテゴリを作る
              </button>
            </div>
          </div>
        )}

        {creating && (
          <div style={{ background: "#0a1628", border: "1px solid #1e3a6e", borderRadius: 10, padding: 14, marginBottom: 14 }}>
            <div style={{ ...lbl, marginBottom: 10 }}>新しいカテゴリを作成</div>
            <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
              <input value={newEmoji} onChange={(e) => setNewEmoji(e.target.value)} style={{ ...inputSt, width: 60, textAlign: "center", fontSize: 20, padding: "8px" }} maxLength={4} />
              <input value={newLabel} onChange={(e) => setNewLabel(e.target.value)} placeholder="カテゴリ名（例: パン）" style={{ ...inputSt, flex: 1 }} />
            </div>
            <button onClick={() => setCreating(false)} style={{ fontSize: 12, color: "#6c8ebf", background: "none", border: "none", cursor: "pointer" }}>← 既存から選ぶ</button>
          </div>
        )}

        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={onClose} style={{ ...btnGhost, flex: 1 }}>キャンセル</button>
          <button onClick={doSave} style={{ ...btnPrimary, flex: 2 }}>登録して自動分類 →</button>
        </div>
      </div>
    </div>
  );
}

function ImportConflictModal({ pendingImport, onChoiceChange, onCancel, onApply }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.78)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 150 }} onClick={onCancel}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: "#1a1f2e", borderRadius: "18px 18px 0 0", width: "100%", maxWidth: 480, margin: "0 auto", padding: "20px 20px 44px", border: "1px solid #2a2f3e", borderBottom: "none", maxHeight: "86vh", overflowY: "auto" }}>
        <div style={lbl}>IMPORT CONFLICT</div>
        <div style={{ fontSize: 18, fontWeight: 800, color: "#e8eaf0", margin: "4px 0 12px" }}>競合を解決して取り込む</div>
        <div style={{ fontSize: 12, color: "#555", marginBottom: 14, lineHeight: 1.6 }}>
          競合ごとに「現在の値」か「インポート値」を選んで、最後にまとめて適用します。
        </div>

        {pendingImport.conflicts.map((conflict) => {
          const selected = pendingImport.choices[conflict.id] || "current";
          return (
            <div key={conflict.id} style={{ ...card, padding: "12px 12px 10px", marginBottom: 10 }}>
              <div style={{ fontSize: 13, color: "#d0d8f0", fontWeight: 700, marginBottom: 8 }}>{conflict.label}</div>
              <div style={{ fontSize: 11, color: "#6c8ebf", lineHeight: 1.5, marginBottom: 10 }}>{conflict.currentText}</div>
              <div style={{ fontSize: 11, color: "#f59e0b", lineHeight: 1.5, marginBottom: 10 }}>{conflict.importedText}</div>
              <div style={{ display: "flex", gap: 8 }}>
                <button
                  onClick={() => onChoiceChange(conflict.id, "current")}
                  style={{
                    flex: 1,
                    padding: "9px 10px",
                    borderRadius: 8,
                    border: `1px solid ${selected === "current" ? "#3b82f6" : "#2a2f3e"}`,
                    background: selected === "current" ? "#1e3a6e" : "#0f1117",
                    color: selected === "current" ? "#93c5fd" : "#666",
                    fontSize: 12,
                    cursor: "pointer",
                  }}
                >
                  現在の値
                </button>
                <button
                  onClick={() => onChoiceChange(conflict.id, "imported")}
                  style={{
                    flex: 1,
                    padding: "9px 10px",
                    borderRadius: 8,
                    border: `1px solid ${selected === "imported" ? "#f59e0b" : "#2a2f3e"}`,
                    background: selected === "imported" ? "#3d2a08" : "#0f1117",
                    color: selected === "imported" ? "#f59e0b" : "#666",
                    fontSize: 12,
                    cursor: "pointer",
                  }}
                >
                  インポート値
                </button>
              </div>
            </div>
          );
        })}

        <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
          <button onClick={onCancel} style={{ ...btnGhost, flex: 1 }}>キャンセル</button>
          <button onClick={onApply} style={{ ...btnPrimary, flex: 2 }}>選択内容で適用</button>
        </div>
      </div>
    </div>
  );
}

function SettingsScreen({
  categoryOrder,
  customCategories,
  otherCategoryName,
  onOrderChange,
  onDeleteCustom,
  onClose,
  onExportSettings,
  onImportFile,
  importNotice,
  onDismissNotice,
  pendingImport,
  onConflictChoice,
  onApplyImport,
  onCancelImport,
}) {
  const [order, setOrder] = useState(categoryOrder);
  const fileInputRef = useRef(null);

  useEffect(() => {
    setOrder(categoryOrder);
  }, [categoryOrder]);

  const move = (idx, dir) => {
    const next = [...order];
    const target = idx + dir;
    if (target < 0 || target >= next.length) return;
    [next[idx], next[target]] = [next[target], next[idx]];
    setOrder(next);
  };

  const customNames = customCategories.map((c) => c.name);

  return (
    <div style={{ background: "#0f1117", minHeight: "100vh", maxWidth: 480, margin: "0 auto", position: "relative" }}>
      <div style={{ background: "linear-gradient(135deg,#1a1f2e,#16213e)", padding: "20px 20px 16px", borderBottom: "1px solid #2a2f3e", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={lbl}>SETTINGS</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: "#e8eaf0", marginTop: 2 }}>⚙️ 売り場順の設定</div>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#555", fontSize: 22, cursor: "pointer" }}>✕</button>
        </div>
      </div>

      <div style={{ padding: 16 }}>
        <div style={{ fontSize: 12, color: "#555", marginBottom: 12, lineHeight: 1.6 }}>
          ▲▼ で順番を変更できます。カスタムカテゴリは 🗑️ で削除できます。
        </div>

        {order.map((cat, idx) => {
          const isCustom = customNames.includes(cat);
          const isOther  = cat === otherCategoryName;
          return (
            <div key={cat} style={{ ...card, display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", marginBottom: 8, borderColor: isCustom ? "#1e3a6e" : "#2a2f3e" }}>
              <div style={{ flex: 1, fontSize: 14, color: isOther ? "#555" : "#d0d8f0" }}>{cat}</div>
              {isCustom && (
                <button onClick={() => { const next = order.filter((c) => c !== cat); setOrder(next); onDeleteCustom(cat); }}
                  style={{ background: "none", border: "none", color: "#555", fontSize: 16, cursor: "pointer", padding: "4px 6px" }}>
                  🗑️
                </button>
              )}
              <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                <button onClick={() => move(idx, -1)} disabled={idx === 0}
                  style={{ background: idx === 0 ? "#1a1f2e" : "#1e2535", border: "1px solid #2a2f3e", borderRadius: 4, color: idx === 0 ? "#333" : "#6c8ebf", fontSize: 11, cursor: idx === 0 ? "default" : "pointer", padding: "3px 7px" }}>▲</button>
                <button onClick={() => move(idx, 1)} disabled={idx === order.length - 1}
                  style={{ background: idx === order.length - 1 ? "#1a1f2e" : "#1e2535", border: "1px solid #2a2f3e", borderRadius: 4, color: idx === order.length - 1 ? "#333" : "#6c8ebf", fontSize: 11, cursor: idx === order.length - 1 ? "default" : "pointer", padding: "3px 7px" }}>▼</button>
              </div>
            </div>
          );
        })}

        <button onClick={() => onOrderChange(order)} style={{ ...btnPrimary, width: "100%", marginTop: 8, padding: "16px" }}>
          この順番で保存 ✓
        </button>

        <div style={{ ...card, marginTop: 14, padding: 14 }}>
          <div style={lbl}>DATA PORTABILITY</div>
          <div style={{ fontSize: 15, color: "#d0d8f0", fontWeight: 700, marginTop: 4, marginBottom: 10 }}>設定データの共有</div>
          <div style={{ fontSize: 12, color: "#555", lineHeight: 1.6, marginBottom: 12 }}>
            ユーザー追加のキーワード・カテゴリ・表示順を JSON で保存/取り込みできます。
          </div>

          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={onExportSettings} style={{ ...btnGhost, flex: 1, color: "#d0d8f0", borderColor: "#3a4050" }}>
              設定をエクスポート
            </button>
            <button onClick={() => fileInputRef.current && fileInputRef.current.click()} style={{ ...btnPrimary, flex: 1 }}>
              設定をインポート
            </button>
            <input
              ref={fileInputRef}
              type="file"
              accept="application/json,.json"
              style={{ display: "none" }}
              onChange={(e) => {
                const file = e.target.files && e.target.files[0];
                if (file) onImportFile(file);
                e.target.value = "";
              }}
            />
          </div>

          {importNotice && (
            <div style={{
              marginTop: 10,
              borderRadius: 8,
              padding: "8px 10px",
              fontSize: 12,
              lineHeight: 1.5,
              border: importNotice.type === "success"
                ? "1px solid #1a3a2a"
                : importNotice.type === "info"
                  ? "1px solid #2a2f3e"
                  : "1px solid #4a3010",
              background: importNotice.type === "success"
                ? "#0d1a0f"
                : importNotice.type === "info"
                  ? "#141a2a"
                  : "#1e1810",
              color: importNotice.type === "success"
                ? "#4ade80"
                : importNotice.type === "info"
                  ? "#93c5fd"
                  : "#f59e0b",
            }}>
              <div>{importNotice.message}</div>
              <button onClick={onDismissNotice} style={{ background: "none", border: "none", color: "inherit", fontSize: 11, marginTop: 4, cursor: "pointer", textDecoration: "underline" }}>
                閉じる
              </button>
            </div>
          )}
        </div>
      </div>

      {pendingImport && (
        <ImportConflictModal
          pendingImport={pendingImport}
          onChoiceChange={onConflictChoice}
          onApply={onApplyImport}
          onCancel={onCancelImport}
        />
      )}
    </div>
  );
}

function GroceryApp({ defaultConfig }) {
  const { defaultCategoryMap, defaultCategoryKeys, defaultOrder, otherCategoryName } = defaultConfig;

  const [phase, setPhase]                       = useState("paste");
  const [rawText, setRawText]                   = useState("");
  const [items, setItems]                       = useState([]);
  const [customKeywords, setCustomKeywords]     = useState({});
  const [customCategories, setCustomCategories] = useState([]);
  const [categoryOrder, setCategoryOrder]       = useState(defaultOrder);
  const [registerItem, setRegisterItem]         = useState(null);
  const [savedFlash, setSavedFlash]             = useState(null);
  const [importNotice, setImportNotice]         = useState(null);
  const [pendingImport, setPendingImport]       = useState(null);

  const persistUserData = useCallback((nextKeywords, nextCategories, nextOrder) => {
    setCustomKeywords(nextKeywords);
    setCustomCategories(nextCategories);
    setCategoryOrder(nextOrder);
    ls.set(SK_KEYWORDS, JSON.stringify(nextKeywords));
    ls.set(SK_CATEGORIES, JSON.stringify(nextCategories));
    ls.set(SK_ORDER, JSON.stringify(nextOrder));
  }, []);

  useEffect(() => {
    try {
      const rawKeywords = ls.get(SK_KEYWORDS);
      const rawCategories = ls.get(SK_CATEGORIES);
      const rawOrder = ls.get(SK_ORDER);

      let nextKeywords = {};
      let nextCategories = [];
      let nextOrder = defaultOrder;

      if (rawCategories) {
        nextCategories = sanitizeCustomCategories(JSON.parse(rawCategories), otherCategoryName);
      }

      if (rawKeywords) {
        nextKeywords = sanitizeKeywordMap(JSON.parse(rawKeywords));
      }

      const allowedCategoryNames = [
        ...defaultCategoryKeys,
        ...nextCategories.map((c) => c.name),
        otherCategoryName,
      ];
      nextKeywords = filterKeywordTargets(nextKeywords, allowedCategoryNames);

      if (rawOrder) {
        nextOrder = sanitizeCategoryOrder(JSON.parse(rawOrder), defaultCategoryKeys, nextCategories, otherCategoryName);
      }

      setCustomCategories(nextCategories);
      setCustomKeywords(nextKeywords);
      setCategoryOrder(nextOrder);
    } catch (error) {
      console.error(error);
    }
  }, [defaultCategoryKeys, defaultOrder, otherCategoryName]);

  const reset = useCallback(() => {
    setPhase("paste");
    setRawText("");
    setItems([]);
    setRegisterItem(null);
  }, []);

  const handleStart = useCallback(() => {
    try {
      const map = buildCategoryMap(defaultCategoryMap, customKeywords, customCategories);
      const parsed = parseList(rawText, map, otherCategoryName);
      if (!parsed.length) return;
      setItems(parsed);
      setPhase("shop");
    } catch (e) {
      console.error(e);
    }
  }, [rawText, defaultCategoryMap, customKeywords, customCategories, otherCategoryName]);

  const toggle = useCallback((id) => {
    setItems((prev) => prev.map((item) => item.id === id ? { ...item, done: !item.done } : item));
  }, []);

  const handleRegisterSave = useCallback((keyword, cat, newCat) => {
    let resolvedCategory = cat;
    let nextCategories = customCategories;
    let nextOrder = categoryOrder;

    if (newCat) {
      const name = newCat.name;
      const alreadyExists = defaultCategoryKeys.includes(name) || customCategories.some((c) => c.name === name);
      if (!alreadyExists) {
        nextCategories = [...customCategories, newCat];
        const otherIdx = nextOrder.indexOf(otherCategoryName);
        nextOrder = otherIdx >= 0
          ? [...nextOrder.slice(0, otherIdx), name, ...nextOrder.slice(otherIdx)]
          : [...nextOrder, name];
      }
      resolvedCategory = name;
    }

    const nextKeywords = { ...customKeywords, [keyword]: resolvedCategory };
    const normalizedOrder = sanitizeCategoryOrder(nextOrder, defaultCategoryKeys, nextCategories, otherCategoryName);

    persistUserData(nextKeywords, nextCategories, normalizedOrder);
    setItems((prev) => prev.map((item) => item.name.includes(keyword) ? { ...item, category: resolvedCategory } : item));
    setSavedFlash(keyword);
    setTimeout(() => setSavedFlash(null), 2500);
    setRegisterItem(null);
  }, [customKeywords, customCategories, categoryOrder, defaultCategoryKeys, otherCategoryName, persistUserData]);

  const handleOrderChange = useCallback((newOrder) => {
    const normalized = sanitizeCategoryOrder(newOrder, defaultCategoryKeys, customCategories, otherCategoryName);
    persistUserData(customKeywords, customCategories, normalized);
    setPhase("paste");
  }, [customKeywords, customCategories, defaultCategoryKeys, otherCategoryName, persistUserData]);

  const handleDeleteCustom = useCallback((catName) => {
    const nextCategories = customCategories.filter((c) => c.name !== catName);
    const nextKeywords = Object.fromEntries(Object.entries(customKeywords).filter(([, v]) => v !== catName));
    const nextOrder = sanitizeCategoryOrder(
      categoryOrder.filter((name) => name !== catName),
      defaultCategoryKeys,
      nextCategories,
      otherCategoryName,
    );
    persistUserData(nextKeywords, nextCategories, nextOrder);
  }, [customCategories, customKeywords, categoryOrder, defaultCategoryKeys, otherCategoryName, persistUserData]);

  const handleExportSettings = useCallback(() => {
    const payload = {
      version: EXPORT_SCHEMA_VERSION,
      exportedAt: new Date().toISOString(),
      data: {
        customKeywords,
        customCategories,
        categoryOrder,
      },
    };

    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const stamp = new Date().toISOString().replace(/[:.]/g, "-");
    const a = document.createElement("a");
    a.href = url;
    a.download = `grocery-settings-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    setImportNotice({ type: "success", message: "設定をエクスポートしました。" });
  }, [customKeywords, customCategories, categoryOrder]);

  const handleImportFile = useCallback(async (file) => {
    setImportNotice(null);
    setPendingImport(null);

    try {
      const text = await readFileAsText(file);
      let raw;
      try {
        raw = JSON.parse(text);
      } catch {
        throw new Error("JSON の解析に失敗しました。UTF-8 の JSON ファイルを指定してください。");
      }

      const incoming = validateImportPayload(raw, defaultCategoryKeys, otherCategoryName);
      const current = { customKeywords, customCategories, categoryOrder };
      const conflicts = detectImportConflicts(current, incoming);

      if (!conflicts.length) {
        const merged = mergeImportData(current, incoming, {}, defaultCategoryKeys, otherCategoryName);
        persistUserData(merged.customKeywords, merged.customCategories, merged.categoryOrder);
        setImportNotice({ type: "success", message: "競合なしでインポートしました。" });
        return;
      }

      const initialChoices = Object.fromEntries(conflicts.map((conflict) => [conflict.id, "current"]));
      setPendingImport({ incoming, conflicts, choices: initialChoices });
      setImportNotice({ type: "info", message: `競合が ${conflicts.length} 件あります。選択して適用してください。` });
    } catch (error) {
      const message = error instanceof Error ? error.message : "インポートに失敗しました。";
      setImportNotice({ type: "error", message });
    }
  }, [customKeywords, customCategories, categoryOrder, defaultCategoryKeys, otherCategoryName, persistUserData]);

  const handleConflictChoice = useCallback((id, choice) => {
    setPendingImport((prev) => {
      if (!prev) return prev;
      return {
        ...prev,
        choices: { ...prev.choices, [id]: choice },
      };
    });
  }, []);

  const handleApplyImport = useCallback(() => {
    if (!pendingImport) return;
    const current = { customKeywords, customCategories, categoryOrder };
    const merged = mergeImportData(
      current,
      pendingImport.incoming,
      pendingImport.choices,
      defaultCategoryKeys,
      otherCategoryName,
    );
    persistUserData(merged.customKeywords, merged.customCategories, merged.categoryOrder);
    setPendingImport(null);
    setImportNotice({ type: "success", message: "競合を解決してインポートしました。" });
  }, [pendingImport, customKeywords, customCategories, categoryOrder, defaultCategoryKeys, otherCategoryName, persistUserData]);

  const handleCancelImport = useCallback(() => {
    setPendingImport(null);
    setImportNotice({ type: "error", message: "インポートをキャンセルしました。" });
  }, []);

  const groups = {};
  for (const item of items) {
    if (!groups[item.category]) groups[item.category] = [];
    groups[item.category].push(item);
  }

  const ordered = sortedGroups(groups, categoryOrder);
  const doneCount = items.filter((i) => i.done).length;
  const total = items.length;
  const uncategorizedCount = (groups[otherCategoryName] || []).length;
  const allCategoryKeys = [...defaultCategoryKeys, ...customCategories.map((c) => c.name)];

  if (phase === "settings") {
    const settingsOrder = categoryOrder.filter((c) =>
      defaultCategoryKeys.includes(c) || customCategories.some((cc) => cc.name === c) || c === otherCategoryName,
    );

    return (
      <SettingsScreen
        categoryOrder={settingsOrder}
        customCategories={customCategories}
        otherCategoryName={otherCategoryName}
        onOrderChange={handleOrderChange}
        onDeleteCustom={handleDeleteCustom}
        onClose={() => setPhase("paste")}
        onExportSettings={handleExportSettings}
        onImportFile={handleImportFile}
        importNotice={importNotice}
        onDismissNotice={() => setImportNotice(null)}
        pendingImport={pendingImport}
        onConflictChoice={handleConflictChoice}
        onApplyImport={handleApplyImport}
        onCancelImport={handleCancelImport}
      />
    );
  }

  return (
    <div style={{ background: "#0f1117", minHeight: "100vh", color: "#f0f0f0", maxWidth: 480, margin: "0 auto", position: "relative" }}>

      <div style={{ background: "linear-gradient(135deg,#1a1f2e,#16213e)", padding: "20px 20px 16px", borderBottom: "1px solid #2a2f3e", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={lbl}>SHOPPING LIST</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: "#e8eaf0", marginTop: 2 }}>🛒 買い物リスト</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            {phase === "shop" && (
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 28, fontWeight: 800, color: doneCount === total ? "#4ade80" : "#6c8ebf", transition: "color 0.3s" }}>
                  {doneCount}<span style={{ fontSize: 14, color: "#555" }}>/{total}</span>
                </div>
                <div style={{ fontSize: 11, color: "#555" }}>完了</div>
              </div>
            )}
            <button onClick={() => setPhase("settings")} style={{ background: "#1e2535", border: "1px solid #2a2f3e", borderRadius: 8, color: "#6c8ebf", fontSize: 18, cursor: "pointer", width: 38, height: 38, display: "flex", alignItems: "center", justifyContent: "center" }}>
              ⚙️
            </button>
          </div>
        </div>
        {phase === "shop" && (
          <div style={{ marginTop: 10 }}>
            <div style={{ height: 4, background: "#1e2535", borderRadius: 2, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${total > 0 ? (doneCount / total) * 100 : 0}%`, background: doneCount === total ? "linear-gradient(90deg,#4ade80,#22c55e)" : "linear-gradient(90deg,#3b82f6,#6c8ebf)", borderRadius: 2, transition: "width 0.4s ease" }} />
            </div>
          </div>
        )}
      </div>

      <div style={{ padding: 16 }}>
        {phase === "paste" && (
          <div>
            <div style={{ ...card, padding: 16, marginBottom: 14 }}>
              <div style={{ fontSize: 13, color: "#6c8ebf", marginBottom: 10, fontWeight: 600 }}>📋 リストを貼り付け</div>
              <textarea
                value={rawText}
                onChange={(e) => setRawText(e.target.value)}
                placeholder={"例: R-1 6個、そば5個、グミ、納豆..."}
                style={{ width: "100%", minHeight: 180, background: "#0f1117", border: "1px solid #2a2f3e", borderRadius: 8, color: "#e0e0e0", fontSize: 14, padding: 12, resize: "vertical", outline: "none", lineHeight: 1.6, boxSizing: "border-box" }}
              />
              <div style={{ fontSize: 11, color: "#444", marginTop: 6 }}>読点（、）またはカンマ区切りに対応</div>
            </div>

            {Object.keys(customKeywords).length > 0 && (
              <div style={{ background: "#0d1a0f", border: "1px solid #1a3a2a", borderRadius: 10, padding: "10px 14px", marginBottom: 14, fontSize: 12, color: "#4ade80" }}>
                ✅ 登録済みキーワード: {Object.keys(customKeywords).length}件
                <div style={{ color: "#2d6a3a", marginTop: 6, lineHeight: 1.8 }}>
                  {Object.entries(customKeywords).map(([kw, cat]) => (
                    <span key={kw} style={{ display: "inline-block", background: "#0a1f0e", border: "1px solid #1a3a2a", borderRadius: 4, padding: "1px 7px", marginRight: 4, marginBottom: 4, fontSize: 11 }}>
                      {kw} → {cat}
                    </span>
                  ))}
                </div>
              </div>
            )}

            <button onClick={handleStart} disabled={!rawText.trim()} style={{ width: "100%", padding: "16px", background: rawText.trim() ? "linear-gradient(135deg,#3b82f6,#1d4ed8)" : "#1e2535", color: rawText.trim() ? "#fff" : "#333", border: "none", borderRadius: 12, fontSize: 16, fontWeight: 700, cursor: rawText.trim() ? "pointer" : "default", letterSpacing: 1 }}>
              🏪 売り場別に並べる →
            </button>
          </div>
        )}

        {phase === "shop" && (
          <div>
            {doneCount === total && total > 0 && (
              <div style={{ background: "linear-gradient(135deg,#052e16,#14532d)", border: "1px solid #16a34a", borderRadius: 12, padding: "14px 16px", marginBottom: 16, textAlign: "center", fontSize: 15, fontWeight: 700, color: "#4ade80" }}>
                🎉 お買い物完了！
              </div>
            )}
            {uncategorizedCount > 0 && (
              <div style={{ background: "#1e1810", border: "1px solid #3d2e10", borderRadius: 10, padding: "10px 14px", marginBottom: 12, fontSize: 12, color: "#d97706", lineHeight: 1.6 }}>
                ⚠️ <strong>{uncategorizedCount}件</strong>が未分類です。右の <strong style={{ color: "#f59e0b" }}>＋登録</strong> で次回から自動分類されます。
              </div>
            )}

            {ordered.map((category) => {
              const catItems = groups[category];
              const allDone = catItems.every((i) => i.done);
              const isOther = category === otherCategoryName;
              return (
                <div key={category} style={{ ...card, marginBottom: 10, overflow: "hidden", opacity: allDone ? 0.5 : 1, borderColor: allDone ? "#1a3a2a" : isOther ? "#3d2e10" : "#2a2f3e", transition: "all 0.3s" }}>
                  <div style={{ padding: "10px 14px", background: allDone ? "#141c14" : isOther ? "#1a1408" : "#1e2535", fontSize: 12, fontWeight: 700, color: allDone ? "#2d6a3a" : isOther ? "#d97706" : "#6c8ebf", letterSpacing: 1, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span>{category}</span>
                    <span style={{ color: "#444", fontSize: 11, fontWeight: 400 }}>{catItems.filter((i) => i.done).length}/{catItems.length}</span>
                  </div>
                  {catItems.map((item, idx) => (
                    <div key={item.id} style={{ display: "flex", alignItems: "center", borderTop: idx === 0 ? "1px solid #242938" : "1px solid #1c2030", background: item.done ? "#0d1a0f" : "transparent", transition: "background 0.15s" }}>
                      <div onClick={() => toggle(item.id)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "13px 14px", flex: 1, cursor: "pointer", userSelect: "none", WebkitUserSelect: "none" }}>
                        <div style={{ width: 22, height: 22, borderRadius: 6, flexShrink: 0, border: `2px solid ${item.done ? "#22c55e" : "#3a4050"}`, background: item.done ? "#22c55e" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s", fontSize: 13, color: "#fff" }}>
                          {item.done ? "✓" : ""}
                        </div>
                        <span style={{ fontSize: 15, color: item.done ? "#2d5a35" : "#d0d8f0", textDecoration: item.done ? "line-through" : "none", transition: "all 0.2s", lineHeight: 1.4 }}>
                          {item.name}
                        </span>
                      </div>
                      {isOther && (
                        <button onClick={() => setRegisterItem(item)} style={{ padding: "7px 11px", marginRight: 10, flexShrink: 0, background: "#2d1e08", border: "1px solid #4a3010", borderRadius: 8, color: "#f59e0b", fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
                          ＋ 登録
                        </button>
                      )}
                    </div>
                  ))}
                </div>
              );
            })}

            <button onClick={reset} style={{ width: "100%", padding: "14px", background: "transparent", color: "#3a4050", border: "1px solid #2a2f3e", borderRadius: 12, fontSize: 14, cursor: "pointer", marginTop: 8, marginBottom: 40 }}>
              ← リストをリセット
            </button>
          </div>
        )}
      </div>

      {registerItem && (
        <RegisterModal item={registerItem} allCategoryKeys={allCategoryKeys} onSave={handleRegisterSave} onClose={() => setRegisterItem(null)} />
      )}

      {savedFlash && (
        <div style={{ position: "fixed", bottom: 36, left: "50%", transform: "translateX(-50%)", background: "#14532d", border: "1px solid #16a34a", borderRadius: 20, padding: "10px 22px", color: "#4ade80", fontSize: 13, fontWeight: 700, zIndex: 200, whiteSpace: "nowrap", boxShadow: "0 4px 24px rgba(0,0,0,0.6)" }}>
          ✅ 「{savedFlash}」を登録しました
        </div>
      )}
    </div>
  );
}

function StartupErrorScreen({ message }) {
  return (
    <div style={{ minHeight: "100vh", display: "flex", justifyContent: "center", alignItems: "center", padding: 20 }}>
      <div style={{ ...card, maxWidth: 480, width: "100%", padding: 20, borderColor: "#4a3010", background: "#1e1810" }}>
        <div style={{ ...lbl, color: "#f59e0b" }}>STARTUP ERROR</div>
        <div style={{ fontSize: 20, fontWeight: 800, color: "#f59e0b", marginTop: 4, marginBottom: 12 }}>起動エラー</div>
        <div style={{ fontSize: 13, color: "#fcd34d", lineHeight: 1.7, marginBottom: 10 }}>{message}</div>
        <div style={{ fontSize: 12, color: "#d97706", lineHeight: 1.7 }}>
          ローカルサーバーで起動して、`default-categories.json` の形式を確認してください。
        </div>
        <pre style={{ marginTop: 10, background: "#0f1117", color: "#d1d5db", border: "1px solid #2a2f3e", borderRadius: 8, padding: 10, fontSize: 12, overflowX: "auto" }}>python -m http.server 8000</pre>
      </div>
    </div>
  );
}

async function bootstrap() {
  const rootEl = document.getElementById("root");
  const root = ReactDOM.createRoot(rootEl);

  try {
    const defaultConfig = await loadDefaultConfig();
    root.render(<GroceryApp defaultConfig={defaultConfig} />);
  } catch (error) {
    const message = error instanceof Error ? error.message : "不明なエラーが発生しました。";
    root.render(<StartupErrorScreen message={message} />);
  }
}

bootstrap();
</script>
</body>
</html>
